<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - {{ site_title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/lumen/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
</head>
<body>
    <nav class="navbar navbar-expand-lg vermillon-navbar">
        <div class="container-fluid navbar-inner">
            <a class="fw-bold brand-white text-decoration-none" href="/" id="siteTitle">{{ site_title }}</a>
            <div class="saturn-wrap">
                <img src="/static/saturn.png" class="saturn-float" alt="saturn">
            </div>
            <span></span>
        </div>
    </nav>

    <div class="container mt-5" style="flex: 1 0 auto;">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card paper-card">
                    <div class="card-header paper-card-header text-center">后台登录</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="username" class="form-label small text-muted">用户名</label>
                            <input type="text" id="username" class="form-control paper-input" placeholder="admin" value="admin">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label small text-muted">密码</label>
                            <input type="password" id="password" class="form-control paper-input" placeholder="请输入密码">
                        </div>
                        <div class="d-grid">
                            <button id="loginBtn" class="btn btn-paper">进入管理后台</button>
                        </div>
                        <div id="loginError" class="text-danger small mt-2 text-center d-none"></div>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="/" class="text-muted small">返回首页</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script>
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const params = new URLSearchParams(location.search);
        const redirect = params.get('redirect') || '/admin';

        loginBtn.addEventListener('click', async () => {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username.value.trim(), password: password.value })
            });
            if (res.ok) {
                location.href = redirect;
            } else {
                const err = await res.json();
                loginError.textContent = err.error || '登录失败';
                loginError.classList.remove('d-none');
            }
        });

        password.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>

    <footer class="site-footer mt-5">
        <div class="container-fluid footer-inner">
            <span>© 2026 Vermillon</span>
            <span class="version" id="siteVersion"></span>
        </div>
    </footer>
</body>
</html>
