<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/lumen/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg vermillon-navbar">
        <div class="container-fluid navbar-inner">
            <a class="fw-bold brand-white text-decoration-none" href="/" id="siteTitle">{{ site_title }}</a>
            <div class="saturn-wrap">
                <img src="/static/saturn.png" class="saturn-float" alt="saturn">
            </div>
            <div class="d-flex align-items-center gap-2">
                <a href="/admin" class="btn btn-light btn-sm">管理</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row g-4">
            <aside class="col-lg-3 col-md-4">
                <div class="mb-3">
                    <div class="input-group">
                        <input type="text" id="searchInput" placeholder="Search memos..." class="form-control paper-input">
                        <button class="btn btn-paper" type="button" id="searchBtn">搜索</button>
                    </div>
                </div>
                <div class="card paper-card mb-3">
                    <div class="card-header paper-card-header d-flex justify-content-between align-items-center">
                        <span id="calendarTitle"></span>
                        <div class="d-flex gap-1">
                            <button class="btn calendar-nav-btn" id="prevMonth">&lt;</button>
                            <button class="btn calendar-nav-btn" id="nextMonth">&gt;</button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-bordered table-sm mb-0 calendar-table">
                            <thead class="paper-thead">
                                <tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr>
                            </thead>
                            <tbody id="calendarBody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="card paper-card mb-3 d-none" id="dayMemosCard">
                    <div class="card-header paper-card-header d-flex justify-content-between align-items-center">
                        <span>当日文档</span>
                        <span class="badge paper-badge" id="dayMemosCount">0</span>
                    </div>
                    <div class="card-body p-0">
                        <ul class="list-group list-group-flush" id="dayMemosList">
                            <li class="list-group-item text-muted small paper-list-item">点击日历日期查看</li>
                        </ul>
                    </div>
                </div>
                <div class="card paper-card">
                    <div class="card-header paper-card-header">标签</div>
                    <div class="card-body">
                        <div id="tagsList" class="d-flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </aside>

            <main class="col-lg-9 col-md-8">
                <div id="filterBar" class="alert paper-alert alert-dismissible fade show d-none" role="alert">
                    <span id="filterText"></span>
                    <button type="button" class="btn-close" id="clearFilter" aria-label="Close"></button>
                </div>
                <div id="timeline" class="d-flex flex-column gap-3"></div>
                <div id="loadMoreBox" class="text-center mt-4">
                    <button id="loadMoreBtn" class="btn btn-paper">加载更多</button>
                </div>
            </main>
        </div>
    </div>

    <button class="back-to-top" id="backToTop" title="返回顶部">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M8 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L7.5 2.707V14.5a.5.5 0 0 0 .5.5z"/></svg>
    </button>

    <footer class="site-footer mt-5">
        <div class="container-fluid footer-inner">
            <span>© 2026 Vermillon</span>
            <span class="version" id="siteVersion"></span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
