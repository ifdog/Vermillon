<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑 - Vermillon</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/lumen/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body class="write-page">
    <nav class="navbar navbar-expand-lg vermillon-navbar">
        <div class="container-fluid navbar-inner">
            <a href="/admin" class="btn btn-light btn-sm">管理</a>
            <a class="navbar-brand mx-auto fw-bold brand-white" href="/">Vermillon</a>
            <div class="d-flex align-items-center">
                <button id="saveBtn" class="btn btn-light btn-sm">发布</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row g-3 paper-row">
            <div class="col-md-6 d-flex flex-column">
                <div class="mb-2">
                    <span class="small text-muted me-2">心情 / 天气:</span>
                    <div class="btn-group btn-group-sm" id="moodSelector" role="group">
                        <button type="button" class="btn btn-paper-outline" data-mood="">无</button>
                        <button type="button" class="btn btn-paper-outline" data-mood="😊">😊</button>
                        <button type="button" class="btn btn-paper-outline" data-mood="😐">😐</button>
                        <button type="button" class="btn btn-paper-outline" data-mood="😔">😔</button>
                        <button type="button" class="btn btn-paper-outline" data-mood="🤔">🤔</button>
                        <button type="button" class="btn btn-paper-outline" data-mood="🎉">🎉</button>
                        <button type="button" class="btn btn-paper-outline" data-mood="☕️">☕️</button>
                        <button type="button" class="btn btn-paper-outline" data-mood="🌧️">🌧️</button>
                        <button type="button" class="btn btn-paper-outline" data-mood="☀️">☀️</button>
                        <button type="button" class="btn btn-paper-outline" data-mood="🌙">🌙</button>
                    </div>
                </div>
                <textarea id="editor" class="form-control flex-grow-1 font-monospace paper-textarea" style="min-height: 300px;" placeholder="在此输入 Markdown... 支持 #标签"></textarea>
                <div class="upload-area mt-3 p-4 border border-2 border-dashed rounded text-center text-muted paper-upload" id="uploadArea">
                    <p class="mb-0">拖拽图片或文件到此处上传，或点击选择文件</p>
                    <input type="file" id="fileInput" multiple class="d-none">
                </div>
                <div id="uploadList" class="mt-2 small text-muted"></div>
            </div>
            <div class="col-md-6">
                <div class="card paper-card h-100">
                    <div class="card-header paper-card-header text-uppercase small text-muted">预览</div>
                    <div class="card-body markdown-body" id="preview"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/write.js"></script>
</body>
</html>
