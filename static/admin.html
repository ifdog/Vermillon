<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Vermillon</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/lumen/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg vermillon-navbar">
        <div class="container-fluid navbar-inner">
            <a href="/" class="btn btn-light btn-sm">首页</a>
            <a class="navbar-brand mx-auto fw-bold brand-white" href="/">Vermillon</a>
            <div class="d-flex align-items-center">
                <a href="/write" class="btn btn-light btn-sm">新建文章</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="card paper-card">
            <div class="card-header paper-card-header d-flex justify-content-between align-items-center">
                <span>文章管理</span>
                <span class="badge paper-badge" id="totalCount">0 篇</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 paper-table">
                        <thead>
                            <tr>
                                <th style="width:60px">ID</th>
                                <th>标题</th>
                                <th style="width:120px">心情</th>
                                <th style="width:160px">发布时间</th>
                                <th style="width:140px">操作</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody">
                            <tr><td colspan="5" class="text-center text-muted py-4">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <nav class="mt-3 d-flex justify-content-center" id="pagination">
            <ul class="pagination pagination-sm paper-pagination"></ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script>
        // Check login state
        if (!localStorage.getItem('adminKey')) {
            location.href = '/login?redirect=/admin';
        }
    </script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
