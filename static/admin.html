<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Vermillon</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/lumen/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
</head>
<body>
    <nav class="navbar navbar-expand-lg vermillon-navbar">
        <div class="container-fluid navbar-inner">
            <a class="fw-bold brand-white text-decoration-none" href="/" id="navSiteTitle">Vermillon</a>
            <div class="saturn-wrap">
                <img src="/static/saturn.png" class="saturn-float" alt="saturn">
            </div>
            <div class="d-flex align-items-center gap-2">
                <a href="/write" class="btn btn-light btn-sm" id="newArticleBtn">新建文章</a>
                <button id="logoutBtn" class="btn btn-light btn-sm">退出</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row g-4">
            <!-- Left Sidebar: Navigation -->
            <div class="col-lg-3 col-md-4">
                <div class="card paper-card">
                    <div class="card-header paper-card-header">管理菜单</div>
                    <div class="list-group list-group-flush">
                        <button class="list-group-item list-group-item-action paper-list-item active" data-section="site">
                            🌐 网站管理
                        </button>
                        <button class="list-group-item list-group-item-action paper-list-item" data-section="user">
                            👤 用户管理
                        </button>
                        <button class="list-group-item list-group-item-action paper-list-item" data-section="articles">
                            📝 文章管理
                        </button>
                        <button class="list-group-item list-group-item-action paper-list-item" data-section="stats">
                            📊 数值管理
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Functionality -->
            <div class="col-lg-9 col-md-8">
                <!-- Site Management -->
                <div id="section-site" class="admin-section">
                    <div class="card paper-card mb-4">
                        <div class="card-header paper-card-header">站点设置</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label small text-muted">站点名称</label>
                                <input type="text" id="siteTitle" class="form-control paper-input" placeholder="Vermillon">
                            </div>
                            <button id="saveSiteBtn" class="btn btn-paper">保存设置</button>
                            <div id="siteMsg" class="small mt-2 d-none"></div>
                        </div>
                    </div>
                </div>

                <!-- User Management -->
                <div id="section-user" class="admin-section d-none">
                    <div class="card paper-card mb-4">
                        <div class="card-header paper-card-header">修改用户名</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label small text-muted">新用户名</label>
                                <input type="text" id="newUsername" class="form-control form-control-sm paper-input">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-muted">当前密码</label>
                                <input type="password" id="usernamePassword" class="form-control form-control-sm paper-input">
                            </div>
                            <button id="changeUsernameBtn" class="btn btn-paper btn-sm">修改用户名</button>
                            <div id="usernameMsg" class="small mt-2 d-none"></div>
                        </div>
                    </div>
                    <div class="card paper-card">
                        <div class="card-header paper-card-header">修改密码</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label small text-muted">当前密码</label>
                                <input type="password" id="currentPassword" class="form-control form-control-sm paper-input">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-muted">新密码</label>
                                <input type="password" id="newPassword" class="form-control form-control-sm paper-input">
                            </div>
                            <button id="changePasswordBtn" class="btn btn-paper btn-sm">修改密码</button>
                            <div id="passwordMsg" class="small mt-2 d-none"></div>
                        </div>
                    </div>
                </div>

                <!-- Articles Management -->
                <div id="section-articles" class="admin-section d-none">
                    <div class="card paper-card">
                        <div class="card-header paper-card-header d-flex justify-content-between align-items-center">
                            <span>文章列表</span>
                            <span class="badge paper-badge" id="totalCount">0 篇</span>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0 paper-table">
                                    <thead>
                                        <tr>
                                            <th style="width:60px">ID</th>
                                            <th>标题</th>
                                            <th style="width:160px">发布时间</th>
                                            <th style="width:140px">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="adminTableBody">
                                        <tr><td colspan="4" class="text-center text-muted py-4">加载中...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <nav class="mt-3 d-flex justify-content-center" id="pagination">
                        <ul class="pagination pagination-sm paper-pagination"></ul>
                    </nav>
                </div>

                <!-- Stats Management -->
                <div id="section-stats" class="admin-section d-none">
                    <div class="row g-3 mb-4">
                        <div class="col-md-3 col-6">
                            <div class="card paper-card text-center p-3">
                                <div class="display-6 text-muted" id="statTotalVisits">0</div>
                                <div class="small text-muted">整站访问量</div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="card paper-card text-center p-3">
                                <div class="display-6 text-muted" id="statIndexVisits">0</div>
                                <div class="small text-muted">首页浏览量</div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="card paper-card text-center p-3">
                                <div class="display-6 text-muted" id="statTodayVisits">0</div>
                                <div class="small text-muted">今日访问</div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="card paper-card text-center p-3">
                                <div class="display-6 text-muted" id="statTotalMemos">0</div>
                                <div class="small text-muted">文章总数</div>
                            </div>
                        </div>
                    </div>
                    <div class="card paper-card">
                        <div class="card-header paper-card-header">最近浏览记录</div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-sm mb-0 paper-table">
                                    <thead>
                                        <tr>
                                            <th>时间</th>
                                            <th>路径</th>
                                            <th>IP</th>
                                            <th>UA</th>
                                        </tr>
                                    </thead>
                                    <tbody id="visitsTableBody">
                                        <tr><td colspan="4" class="text-center text-muted py-4">加载中...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <nav class="mt-3 d-flex justify-content-center" id="visitsPagination">
                        <ul class="pagination pagination-sm paper-pagination"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
