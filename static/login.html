<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Vermillon</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/lumen/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg vermillon-navbar">
        <div class="container-fluid navbar-inner">
            <span></span>
            <a class="navbar-brand mx-auto fw-bold brand-white" href="/">Vermillon</a>
            <span></span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card paper-card">
                    <div class="card-header paper-card-header text-center">后台登录</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="loginKey" class="form-label small text-muted">Admin Key</label>
                            <input type="password" id="loginKey" class="form-control paper-input" placeholder="请输入管理密钥">
                        </div>
                        <div class="d-grid">
                            <button id="loginBtn" class="btn btn-paper">进入管理后台</button>
                        </div>
                        <div id="loginError" class="text-danger small mt-2 text-center d-none">密钥错误</div>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="/" class="text-muted small">返回首页</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script>
        const loginKey = document.getElementById('loginKey');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const params = new URLSearchParams(location.search);
        const redirect = params.get('redirect') || '/admin';

        loginBtn.addEventListener('click', async () => {
            const key = loginKey.value.trim();
            if (!key) return;
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Admin-Key': key
                },
                body: JSON.stringify({ key })
            });
            if (res.ok) {
                localStorage.setItem('adminKey', key);
                location.href = redirect;
            } else {
                loginError.classList.remove('d-none');
            }
        });

        loginKey.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>
</html>
