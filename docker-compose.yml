version: '3.8'

services:
  vermillon:
    build: .
    container_name: vermillon
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    environment:
      - ADMIN_KEY=${ADMIN_KEY:-dev-key-change-in-production}
      - DATABASE_URL=/data/vermillon.db
      - UPLOAD_FOLDER=/data/uploads
    restart: unless-stopped
